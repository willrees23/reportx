# ReportX — storage backend.
# backend: sqlite | mysql | postgres
backend: sqlite

sqlite:
  # File is created relative to plugins/ReportX/ if not absolute.
  file: reports.db

mysql:
  host: localhost
  port: 3306
  database: reportx
  username: reportx
  password: ""
  pool-size: 10

postgres:
  host: localhost
  port: 5432
  database: reportx
  username: reportx
  password: ""
  pool-size: 10
